        function studyDashboard() {
            return {
                darkMode: false,
                showDistractionOverlay: false,
                newSubjectName: '',
                activeSubjectIndex: null,
                totalStudyMinutes: 0,
                currentLang: 'az', // Varsayılan dil
                
                subjects: [
                    { name: 'Riyaziyyat', seconds: 1200 },
                    { name: 'Xarici Dil', seconds: 600 },
                    { name: 'Tarix', seconds: 300 }
                ],
                
                pomodoroSeconds: 1500,
                pomodoroRunning: false,
                pomoMemeText: "",
                
                newTodoText: '',
                todos: [],
                
                aiInputText: '',
                aiOutputText: '',
                
                chartInstance: null,

                // Dil Tərcümə Funksiyası
                t(key) {
                    return languages[this.currentLang][key] || languages['en'][key] || key;
                },

                initApp() {
                    // Dil seçimi yaddaşını yoxla
                    if (localStorage.getItem('study_lang')) {
                        this.currentLang = localStorage.getItem('study_lang');
                    }
                    
                    if (localStorage.theme === 'dark' || (!('theme' in localStorage) && window.matchMedia('(prefers-color-scheme: dark)').matches)) {
                        this.darkMode = true;
                    }
                    
                    if (localStorage.getItem('study_subjects')) {
                        this.subjects = JSON.parse(localStorage.getItem('study_subjects'));
                    } else {
                        // İlk açılış fənn adlarını dilə görə adaptasiya et
                        if(this.currentLang !== 'az') {
                            this.subjects = [
                                { name: this.currentLang === 'tr' ? 'Matematik' : 'Math', seconds: 1200 },
                                { name: this.currentLang === 'tr' ? 'Yabancı Dil' : 'Language', seconds: 600 },
                                { name: this.currentLang === 'tr' ? 'Tarih' : 'History', seconds: 300 }
                            ];
                        }
                    }
                    if (localStorage.getItem('study_todos')) {
                        this.todos = JSON.parse(localStorage.getItem('study_todos'));
                    }
                    
                    this.pomoMemeText = this.t('meme1');
                    this.calculateTotalMinutes();
                    this.initChart();
                    
                    // Tab Procrastination Detector
                    document.addEventListener('visibilitychange', () => {
                        if (document.hidden && this.pomodoroRunning) {
                            this.showDistractionOverlay = true;
                            this.pomodoroRunning = false;
                        }
                    });

                    // Heartbeat Interval System
                    setInterval(() => {
                        if (this.activeSubjectIndex !== null) {
                            this.subjects[this.activeSubjectIndex].seconds += 1;
                            this.calculateTotalMinutes();
                            this.saveSubjects();
                            this.updateChart();
                        }
                        if (this.pomodoroRunning && this.pomodoroSeconds > 0) {
                            this.pomodoroSeconds--;
                            this.updatePomoMeme();
                            if (this.pomodoroSeconds === 0) {
                                this.pomodoroRunning = false;
                                alert(this.t('alertDone'));
                            }
                        }
                    }, 1000);
                },

                changeLang() {
                    localStorage.setItem('study_lang', this.currentLang);
                    this.updatePomoMeme();
                    this.updateChart();
                },

                toggleTheme() {
                    this.darkMode = !this.darkMode;
                    localStorage.theme = this.darkMode ? 'dark' : 'light';
                },

                addSubject() {
                    if (!this.newSubjectName.trim()) return;
                    this.subjects.push({
                        name: this.newSubjectName.trim(),
                        seconds: 0
                    });
                    this.newSubjectName = '';
                    this.saveSubjects();
                    this.updateChart();
                },

                deleteSubject(index) {
                    if (this.activeSubjectIndex === index) this.activeSubjectIndex = null;
                    this.subjects.splice(index, 1);
                    this.saveSubjects();
                    this.calculateTotalMinutes();
                    this.updateChart();
                },

                toggleSubjectTimer(index) {
                    if (this.activeSubjectIndex === index) {
                        this.activeSubjectIndex = null;
                    } else {
                        this.activeSubjectIndex = index;
                    }
                },

                calculateTotalMinutes() {
                    let totalSecs = this.subjects.reduce((sum, item) => sum + item.seconds, 0);
                    this.totalStudyMinutes = Math.floor(totalSecs / 60);
                },

                formatTime(seconds) {
                    let hrs = Math.floor(seconds / 3600);
                    let mins = Math.floor((seconds % 3600) / 60);
                    let secs = seconds % 60;
                    return `${hrs > 0 ? hrs + 'h ' : ''}${mins}m ${secs}s`;
                },

                getUserRank() {
                    if (this.totalStudyMinutes < 30) return this.t('rank1');
                    if (this.totalStudyMinutes < 120) return this.t('rank2');
                    if (this.totalStudyMinutes < 400) return this.t('rank3');
                    return this.t('rank4');
                },

                togglePomodoro() {
                    this.pomodoroRunning = !this.pomodoroRunning;
                },

                resetPomodoro() {
                    this.pomodoroRunning = false;
                    this.pomodoroSeconds = 1500;
                    this.pomoMemeText = this.t('meme5');
                },

                closeDistractionOverlay() {
                    this.showDistractionOverlay = false;
                },

                updatePomoMeme() {
                    if (this.pomodoroSeconds > 1200) this.pomoMemeText = this.t('meme1');
                    else if (this.pomodoroSeconds <= 1200 && this.pomodoroSeconds > 600) this.pomoMemeText = this.t('meme2');
                    else if (this.pomodoroSeconds <= 600 && this.pomodoroSeconds > 100) this.pomoMemeText = this.t('meme3');
                    else if (this.pomodoroSeconds <= 100 && this.pomodoroSeconds > 0) this.pomoMemeText = this.t('meme4');
                },

                addTodo() {
                    if (!this.newTodoText.trim()) return;
                    this.todos.push({ text: this.newTodoText.trim(), completed: false });
                    this.newTodoText = '';
                    this.saveTodos();
                },

                deleteTodo(index) {
                    this.todos.splice(index, 1);
                    this.saveTodos();
                },

                saveSubjects() { localStorage.setItem('study_subjects', JSON.stringify(this.subjects)); },
                saveTodos() { localStorage.setItem('study_todos', JSON.stringify(this.todos)); },

                generateAiRoast() {
                    if (!this.aiInputText.trim()) return;
                    
                    // Dillərə uyğun yumoristik süni intellekt cavab simulyasiyası
                    const roastsPool = {
                        az: [
                            "Bunun qısası odur ki, sən oxumasan da o bitki səndən daha çox iş görür və günəşdən enerji yığır. Get bir az kitab üzü aç.",
                            "Kitabda bunu 4 səhifə yazıb səni qorxutmaq istəyiblər. Əslində demək istəyir ki, tapşırıqları vaxtında eləməsən gələcəkdə dırnaqarası mütəxəssis olacaqsan.",
                            "Tərcüməsi: Bu mövzu imtahanda mütləq düşəcək və sən hələ də burda qeydlərini mənə analiz etdirirsən. Keç dərsinə!"
                        ],
                        en: [
                            "Long story short: that plant is working way harder than you, absorbing solar panels while you sit here. Go read a book.",
                            "They wrote 4 pages just to scare you. It basically means: if you don't study now, your future job will be automated anyway.",
                            "Translation: This will absolutely be on the exam and you are here wasting time making me summarize it. Go study!"
                        ],
                        tr: [
                            "Özeti şu: Sen yatarken o bitki güneş enerjisini sömürüp senden daha verimli çalışıyor. Azıcık kitap kapağı aç.",
                            "Kitapta bunu 4 sayfa yazıp gözünü korkutmuşlar. Demek istiyor ki: Şimdi çalışmazsan gelecekte sadece boş yapacaksın.",
                            "Tercümesi: Bu konu sınavda kesin çıkacak ve sen hala bana özet çıkarttırıyorsun. Hadi dersinin başına!"
                        ]
                    };

                    let selectPool = roastsPool[this.currentLang] || roastsPool['en'];
                    this.aiOutputText = selectPool[Math.floor(Math.random() * selectPool.length)];
                },

                initChart() {
                    const ctx = document.getElementById('studyChart').getContext('2d');
                    this.chartInstance = new Chart(ctx, {
                        type: 'doughnut',
                        data: {
                            labels: this.subjects.map(s => s.name),
                            datasets: [{
                                data: this.subjects.map(s => Math.floor(s.seconds / 60)),
                                backgroundColor: ['#A8DADC', '#F4A261', '#B5A6C9', '#E63946', '#4EA8DE'],
                                borderWidth: 2,
                                borderColor: '#2B2D42'
                            }]
                        },
                        options: {
                            responsive: true,
                            plugins: { legend: { display: false } }
                        }
                    });
                },

                updateChart() {
                    if (!this.chartInstance) return;
                    this.chartInstance.data.labels = this.subjects.map(s => s.name);
                    this.chartInstance.data.datasets[0].data = this.subjects.map(s => Math.floor(s.seconds / 60));
                    this.chartInstance.update();
                }
            }
        }
    </script>
</body>
